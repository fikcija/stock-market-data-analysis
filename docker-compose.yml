services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    volumes:
      - namenode:/hadoop/dfs/name
    environment:
      - CLUSTER_NAME=asvsp
    env_file:
      - ./src/config/config.env
    ports:
      - 9870:9870
      - 9000:9000

  datanode1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode1
    volumes:
      - datanode1:/hadoop/dfs/data
    env_file:
      - ./src/config/config.env
    environment:
      SERVICE_PRECONDITION: "namenode:9870"

  datanode2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode2
    volumes:
      - datanode2:/hadoop/dfs/data
    env_file:
      - ./src/config/config.env
    environment:
      SERVICE_PRECONDITION: "namenode:9870"

  zoo1:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zoo1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - 2181:2181
    volumes:
      - zoo1_data:/var/lib/zookeeper/data

  kafka1:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka1
    depends_on:
      - zoo1
    ports:
      - 9092:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zoo1:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka1_data:/var/lib/kafka/data

  pg:
    image: postgres:14
    container_name: pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stock_analytics
    ports:
      - 5433:5432
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./src/stream/init_pg.sql:/docker-entrypoint-initdb.d/init_pg.sql

  finnhub-producer:
    build: ./src/stream/producer
    container_name: finnhub-producer
    depends_on:
      - kafka1
    environment:
      - KAFKA_BROKER=kafka1:29092
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
    restart: unless-stopped

  spark-master:
    image: bde2020/spark-master:3.0.1-hadoop3.2
    container_name: spark-master
    volumes:
      - ./src/batch:/batch
      - ./src/batch/queries:/queries
      - ./data:/data:ro
      - ./src/config/spark-defaults.conf:/spark/conf/spark-defaults.conf
      - ./src/config/hive-site.xml:/spark/conf/hive-site.xml
      - ./src/stream:/stream
      - ./data/streaming:/streaming_data:ro
    ports:
      - 8080:8080
      - 7077:7077
    environment:
      - PYSPARK_PYTHON=python3
    env_file:
      - ./src/config/config.env
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G

  spark-worker1:
    image: bde2020/spark-worker:3.0.1-hadoop3.2
    container_name: spark-worker1
    depends_on:
      - spark-master
    volumes:
      - ./data:/data:ro
      - ./src/config/spark-defaults.conf:/spark/conf/spark-defaults.conf
      - ./src/config/hive-site.xml:/spark/conf/hive-site.xml
      - ./src/stream:/stream
      - ./data/streaming:/streaming_data:ro
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=3g
    ports:
      - 8081:8081
    env_file:
      - ./src/config/config.env
    deploy:
      resources:
        limits:
          memory: 5G
        reservations:
          memory: 3G

  spark-worker2:
    image: bde2020/spark-worker:3.0.1-hadoop3.2
    container_name: spark-worker2
    depends_on:
      - spark-master
    volumes:
      - ./data:/data:ro
      - ./src/config/spark-defaults.conf:/spark/conf/spark-defaults.conf
      - ./src/config/hive-site.xml:/spark/conf/hive-site.xml
      - ./src/stream:/stream
      - ./data/streaming:/streaming_data:ro
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=3g
    ports:
      - 8082:8081
    env_file:
      - ./src/config/config.env
    deploy:
      resources:
        limits:
          memory: 5G
        reservations:
          memory: 3G

  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-server
    volumes:
      - ./src/batch:/batch:ro
    env_file:
      - ./src/config/config.env
    environment:
      HIVE_CORE_CONF_javax_jdo_option_ConnectionURL: "jdbc:postgresql://hive-metastore/metastore"
      SERVICE_PRECONDITION: "hive-metastore:9083"
    ports:
      - "10000:10000"

  hive-init:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-init
    depends_on:
      hive-metastore-postgresql:
        condition: service_healthy
    entrypoint: /bin/bash
    command: /scripts/init_hive_schema.sh
    volumes:
      - ./src/scripts:/scripts
    restart: "no"

  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-metastore
    env_file:
      - ./src/config/config.env
    command: /opt/hive/bin/hive --service metastore
    environment:
      SERVICE_PRECONDITION: "namenode:9870 datanode1:9864 datanode2:9864 hive-metastore-postgresql:5432"
    depends_on:
      hive-init:
        condition: service_completed_successfully
    ports:
      - "9083:9083"

  hive-metastore-postgresql:
    image: bde2020/hive-metastore-postgresql:2.3.0
    container_name: hive-metastore-postgresql
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-hive}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-hive}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d hive || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    container_name: resourcemanager
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    env_file:
      - ./src/config/config.env
    ports:
      - 8088:8088
      - 8032:8032
      - 8030:8030
      - 8031:8031

  nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    container_name: nodemanager
    environment:
      SERVICE_PRECONDITION: "namenode:9870 resourcemanager:8088"
    env_file:
      - ./src/config/config.env

  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    container_name: historyserver
    environment:
      SERVICE_PRECONDITION: "namenode:9870 resourcemanager:8088"
    env_file:
      - ./src/config/config.env
    ports:
      - 8188:8188

  hue:
    image: gethue/hue:20201111-135001
    hostname: hue
    container_name: hue
    dns: 8.8.8.8
    ports:
      - "8888:8888"
    volumes:
      - ./src/config/hue_config:/usr/share/hue/desktop/conf
    depends_on:
      - namenode
      - resourcemanager
      - historyserver

volumes:
  namenode:
  datanode1:
  datanode2:
  zoo1_data:
  kafka1_data:
  pg_data: